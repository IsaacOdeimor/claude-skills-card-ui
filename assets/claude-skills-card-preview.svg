    </radialGradient>
    <radialGradient id="vignette" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(600 420) scale(600 420)">
      <stop offset="28%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="65%" stop-color="#000000" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.82"/>
    </radialGradient>
    <filter id="softBlur" x="90" y="40" width="1020" height="760" filterUnits="userSpaceOnUse">
