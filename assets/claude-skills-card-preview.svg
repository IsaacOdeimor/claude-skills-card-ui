  <g transform="translate(260 140)">
    <g transform="translate(0 0)">
      <rect x="34" y="0" width="6" height="36" rx="999" fill="white" transform="rotate(0 34 0)"/>
      <rect x="34" y="0" width="6" height="36" rx="999" fill="white" transform="rotate(45 34 0)"/>
      <rect x="34" y="0" width="6" height="36" rx="999" fill="white" transform="rotate(90 34 0)"/>
      <rect x="34" y="0" width="6" height="36" rx="999" fill="white" transform="rotate(135 34 0)"/>
    </g>
    <text x="56" y="24" fill="white" fill-opacity="0.94" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="28" font-weight="400" letter-spacing="-0.04em">suraj.dsgn</text>
  </g>

  <g text-anchor="middle">
    <text x="600" y="395" fill="white" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="78" font-weight="500" letter-spacing="-0.075em">New Claude Skills</text>
    <text x="600" y="445" fill="white" fill-opacity="0.64" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="34" font-weight="400" letter-spacing="-0.055em">for UI/UX Engineers</text>
  </g>
