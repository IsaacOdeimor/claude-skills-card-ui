<svg width="1200" height="840" viewBox="0 0 1200 840" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#030303"/>
      <stop offset="55%" stop-color="#030303"/>
      <stop offset="78%" stop-color="#130A06"/>
      <stop offset="100%" stop-color="#050403"/>
    </linearGradient>
    <radialGradient id="glow1" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(330 640) rotate(-12) scale(360 150)">
      <stop offset="0%" stop-color="#FAA694" stop-opacity="0.98"/>
      <stop offset="25%" stop-color="#EA8364" stop-opacity="0.82"/>
      <stop offset="50%" stop-color="#7F3927" stop-opacity="0.42"/>
      <stop offset="73%" stop-color="#7F3927" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(690 560) rotate(-8) scale(290 120)">
      <stop offset="0%" stop-color="#C85A34" stop-opacity="0.58"/>
      <stop offset="44%" stop-color="#692D1B" stop-opacity="0.34"/>
      <stop offset="76%" stop-color="#692D1B" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow3" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(510 605) rotate(-4) scale(220 90)">
      <stop offset="0%" stop-color="#F8966F" stop-opacity="0.54"/>
      <stop offset="52%" stop-color="#622B1D" stop-opacity="0.24"/>
