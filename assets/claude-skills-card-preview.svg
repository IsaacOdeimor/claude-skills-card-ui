    </filter>
    <filter id="shadow" x="155" y="50" width="890" height="780" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="28" stdDeviation="35" flood-color="#000000" flood-opacity="0.38"/>
    </filter>
    <clipPath id="cardClip">
      <rect x="210" y="70" width="780" height="700" rx="36"/>
    </clipPath>
  </defs>

  <rect width="1200" height="840" fill="#FFFFFF"/>

  <g filter="url(#shadow)">
    <rect x="210" y="70" width="780" height="700" rx="36" fill="url(#bg)"/>
  </g>

  <g clip-path="url(#cardClip)">
    <g filter="url(#softBlur)">
      <ellipse cx="330" cy="640" rx="360" ry="150" fill="url(#glow1)"/>
      <ellipse cx="690" cy="560" rx="290" ry="120" fill="url(#glow2)"/>
      <ellipse cx="510" cy="605" rx="220" ry="90" fill="url(#glow3)"/>
    </g>
    <rect x="210" y="70" width="780" height="700" fill="url(#vignette)"/>

    <g opacity="0.12">
      <circle cx="310" cy="180" r="1.3" fill="white"/>
      <circle cx="365" cy="260" r="1.1" fill="white"/>
      <circle cx="420" cy="135" r="1.0" fill="white"/>
      <circle cx="520" cy="240" r="1.5" fill="white"/>
      <circle cx="620" cy="180" r="1.2" fill="white"/>
      <circle cx="730" cy="130" r="1.0" fill="white"/>
      <circle cx="860" cy="220" r="1.2" fill="white"/>
      <circle cx="920" cy="170" r="1.1" fill="white"/>
      <circle cx="290" cy="390" r="1.1" fill="white"/>
      <circle cx="390" cy="450" r="1.3" fill="white"/>
      <circle cx="540" cy="510" r="1.2" fill="white"/>
      <circle cx="760" cy="500" r="1.1" fill="white"/>
      <circle cx="900" cy="430" r="1.0" fill="white"/>
      <circle cx="820" cy="610" r="1.2" fill="white"/>
      <circle cx="680" cy="670" r="1.4" fill="white"/>
      <circle cx="430" cy="705" r="1.1" fill="white"/>
